upstream crm_backend  { server backend:8000; }
upstream crm_frontend { server frontend:3000; }

# ── Mahali Africa — main site ─────────────────────────────────────────────────
server {
    listen 80;
    server_name mahaliafrica.com www.mahaliafrica.com;

    location / {
        proxy_pass             http://41.186.188.87:3000;
        proxy_http_version     1.1;
        proxy_connect_timeout  120s;
        proxy_read_timeout     120s;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
    }
}

# ── Mahali Africa — admin panel ───────────────────────────────────────────────
server {
    listen 80;
    server_name admin.mahaliafrica.com;

    location / {
        proxy_pass             http://41.186.188.87:3001;
        proxy_http_version     1.1;
        proxy_connect_timeout  120s;
        proxy_read_timeout     120s;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
    }
}

# ── Mahali Africa — API ───────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.mahaliafrica.com;

    location / {
        proxy_pass         http://41.186.188.87:8090;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
}

# ── SolarHope Africa CRM ──────────────────────────────────────────────────────
server {
    listen 80;
    server_name crm.solarhopeafrica.com;

    client_max_body_size 20M;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options        DENY   always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    location /api/ {
        proxy_pass         http://crm_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass         http://crm_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /static/ {
        proxy_pass http://crm_backend;
    }

    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass         http://crm_frontend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
